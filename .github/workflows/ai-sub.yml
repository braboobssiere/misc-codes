name: Generate Subtitles with AI-Sub

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: 'Direct link to media file (video/audio)'
        required: true
        type: string

jobs:
  process-media:
    runs-on: ubuntu-latest

    steps:

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install --upgrade ai-sub
          npm install -g @google/gemini-cli
          mkdir -p output
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV

      - name: Verify Gemini installation and authentication
        run: gemini hi

      - name: Run ai-sub to generate subtitles
        run: |
          curl -L -o media_file "${{ github.event.inputs.media_url }}"
          ai-sub --split.re-encode.enabled=True --thread.lyrics=0 \
            --dir.out "./output/" "./media_file"

      - name: Upload subtitle files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitles-output
          path: output/
