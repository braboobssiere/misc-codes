name: Auto-Download YT Video 

on:
  workflow_dispatch:
  # schedule: 
  #   - cron: '20,50 * * * *'
  # use cron-job.org instead

concurrency:
  group: Auto-Download YT Video
  cancel-in-progress: false

jobs:
 process-video:
    name: Process Videos
    runs-on: ubuntu-latest
    steps:

      - name: Set weekly cache key
        run: |
          WEEK=$(date +"%Y.%U")
          echo "week=${WEEK}" >> $GITHUB_ENV
          
      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ffmpeg wireguard-tools
          version: ${{ env.week }}

      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wireguard-tools
          echo -e "yt-dlp[default,curl-cffi]\nbgutil-ytdlp-pot-provider\ngigafile" > requirements.txt
          LATEST=$(curl -s https://api.github.com/repos/Brainicism/bgutil-ytdlp-pot-provider/releases/latest | jq -r '.tag_name // "1.3.1"')
          cd ~
          git clone --single-branch --branch $LATEST https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
          cd bgutil-ytdlp-pot-provider/server/
          npm install
          npx tsc
          
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ env.week }}
          
      - name: Install yt-dlp and bgutil
        run: |
          python3 -m pip install --pre yt-dlp[default,curl-cffi]
          python3 -m pip install -U gigafile bgutil-ytdlp-pot-provider 'https://github.com/xob0t/google_photos_mobile_client/archive/refs/heads/main.zip'
          
      - name: VPN Setup 
        env: 
          PRIMARY_CONFIG: ${{ secrets.WIREGUARD_GRANDCENTRAL }}
          SECONDARY_CONFIG: ${{ secrets.WIREGUARD_TRADEWAR }}
          
        run: |
          sudo mkdir -p /etc/wireguard/
          WG_CONF="/etc/wireguard/wg0.conf"
          handle_vpn_attempt() {
            local config_content="$1"
            local label="$2"
            
            echo "$config_content" | sudo tee $WG_CONF > /dev/null
            sudo chmod 600 $WG_CONF

            for i in {1..3}; do
              if timeout 60 sudo wg-quick up wg0; then
                return 0
              fi
              echo "${label^} VPN attempt $i/3 failed"
              sleep 3
            done
            return 1
          }
          if ! handle_vpn_attempt "$PRIMARY_CONFIG" "primary"; then
            echo "::warning::Primary failed - Trying secondary"
            if ! handle_vpn_attempt "$SECONDARY_CONFIG" "secondary"; then
              echo "::error::All VPN configurations failed after 3 attempts each"
              exit 11
            fi
          fi
          if ! sudo wg show wg0 >/dev/null 2>&1; then
            echo "::error::VPN connection verification failed"
            exit 12
          fi

      - name: Downloads
        continue-on-error: true
        run: |
          mkdir -p output
          echo "${{ secrets.YT_COOKIES }}" >> yt_cookies.txt
          yt-dlp -i --no-progress -S "+res:1080" --retry-sleep 3 \
          --windows-filenames --live-from-start --write-thumbnail --js-runtimes node \
          --embed-metadata --no-embed-info-json --write-info-json \
          --cookies yt_cookies.txt \
          -o "output/%(title).170B [%(id)s] (%(resolution)s).%(ext)s" \
          --match-filter is_live --match-filter post_live \
          https://youtube.com/@9arm./live https://youtube.com/@REMUKIRADOG/live 2>&1 | tee >(awk '{ print strftime("[%Y-%m-%d %H:%M:%S UTC]"), $0 }' >> output/logs.txt)

      - name: Verify output file
        run: |
          # Remove fragments if exist
          if ls output/*.part 1> /dev/null 2>&1; then
            rm output/*.part
          fi
          # Count files in output directory (including hidden files)
          FILE_COUNT=$(find output/ -type f | wc -l)

          echo "skip_uploads=false" >> $GITHUB_ENV
          if [ $FILE_COUNT -lt 2 ]; then
            echo "Error: yt-dlp have a problem downloading video (found $FILE_COUNT)"
            echo "skip_uploads=true" >> $GITHUB_ENV
          fi

      - name: Upload Artifact
        if: env.skip_uploads == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: downloaded-video
          path: output
          compression-level: 1
          if-no-files-found: error

      - name: Upload Files to G Storage
        if: env.skip_uploads == 'false'
        continue-on-error: true
        env: 
          GP_AUTH_DATA: ${{ secrets.GPMC_AUTH_DATA }}
        run: gpmc "output/"

      - name: VPN Cleanup
        if: ${{ always() }}
        run: sudo wg-quick down wg0 || true     
        
      - name: Upload files
        if: env.skip_uploads == 'false'
        continue-on-error: true
        run: |
          UPLOAD_URL="https://upload.gofile.io/uploadfile"
          guest_token=""
          folder_id=""
          UPLOAD_LINKS=""
          FIRST_FILE=true

          while IFS= read -r -d '' file; do
            echo "▫️ Starting Gofile upload: $(basename "$file")"
            extra_args=()
            if [ "$FIRST_FILE" = false ]; then
              extra_args+=(-H "Authorization: Bearer $guest_token" -F "folderId=$folder_id")
            fi
            
            RESPONSE=$(curl -s -X POST -F "file=@\"$file\"" "${extra_args[@]}" "$UPLOAD_URL")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
            DOWNLOAD_PAGE=$(echo "$RESPONSE" | jq -r '.data.downloadPage // .data // empty')

            if [ "$FIRST_FILE" = true ]; then
              guest_token=$(echo "$RESPONSE" | jq -r '.data.guestToken // empty')
              folder_id=$(echo "$RESPONSE" | jq -r '.data.parentFolder // empty')
              FIRST_FILE=false
              echo "Created Gofile folder"
            fi

            if [ "$STATUS" != "ok" ]; then
              echo "::warning::Gofile upload failed for $(basename "$file"): $DOWNLOAD_PAGE"
            else
              echo "✓ Gofile success: $LINK"
            fi
            LINK="$DOWNLOAD_PAGE"
            UPLOAD_LINKS+="- $(basename "$file") \n"
          done < <(find output/ -type f -print0)

          set -euo pipefail
          name=$(basename "$(find output -type f ! -name '*.txt' -print -quit)" | sed 's/\.[^.]*$//')
          zip -r "${name}.zip" output
          gout=$(gfile --hide-progress upload "${name}.zip")
          gigaURL=$(printf '%s\n' "$gout" | grep -oE 'https?://([^.[:space:]]+\.)?gigafile\.nu/[^[:space:]]+' | tail -n1)

          echo "### File Uploads: $LINK I $gigaURL" >> $GITHUB_STEP_SUMMARY
          echo -e "\n$UPLOAD_LINKS" >> $GITHUB_STEP_SUMMARY

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"File Uploads: $LINK I $gigaURL \n$UPLOAD_LINKS\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"

      - name: Upload to FTP 
        if: env.skip_uploads == 'false'
        continue-on-error: true
        run: |
          mkdir -p ftp_upload
          find output -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.ts" -o -name "*.webm" \) \
            -exec mv -- {} ftp_upload/ \;
          if [ "$(ls -A ftp_upload)" ]; then
            upload_server=$(curl -s "https://api.vidara.so/v1/upload/server?api_key=${{ secrets.STREAMIX_API_KEY }}" | jq -r '.result.upload_server')
            for f in ftp_upload/*; do
              [ -f "$f" ] && curl -X POST $upload_server \
              -F "api_key=${{ secrets.STREAMIX_API_KEY }}" -F "file=@$f" \
              && echo "Uploaded: $(basename "$f")"
            done
          else
                echo "No files found. Skipping FTP upload."
          fi

      - name: Upload to FTP (Server 2)
        if: env.skip_uploads == 'false'
        continue-on-error: true
        run: |
          UPLOAD_SERVER=$(curl -s "https://vidsonic.net/api/v1/getUploadSrv?key=${{ secrets.vidsonic_api_key }}" | jq -r '.server')
          for f in ftp_upload/*; do
            [ -f "$f" ] && curl -X POST $UPLOAD_SERVER \
              -F "apiKey=${{ secrets.vidsonic_api_key }}" -F "video=@$f" \
              && echo "Uploaded: $(basename "$f")"
          done
