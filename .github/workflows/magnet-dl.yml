name: Magnet Downloader
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Input link"
        required: true
        type: string

jobs:
  process-downloader:
    runs-on: ubuntu-latest
    steps:

      - name: Maximize space
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 4096
    
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=16'

      - name: Install Dependency 
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wireguard-tools
          sudo npm install webtorrent-cli -g

      - name: VPN Setup 
        env: 
          PRIMARY_CONFIG: ${{ secrets.WIREGUARD_GRANDCENTRAL }}
          SECONDARY_CONFIG: ${{ secrets.WIREGUARD_TRADEWAR }}
          
        run: |
          sudo mkdir -p /etc/wireguard/
          WG_CONF="/etc/wireguard/wg0.conf"
          handle_vpn_attempt() {
            local config_content="$1"
            local label="$2"
            
            echo "$config_content" | sudo tee $WG_CONF > /dev/null
            sudo chmod 600 $WG_CONF

            for i in {1..3}; do
              if timeout 60 sudo wg-quick up wg0; then
                return 0
              fi
              echo "${label^} VPN attempt $i/3 failed"
              sleep 3
            done
            return 1
          }
          if ! handle_vpn_attempt "$PRIMARY_CONFIG" "primary"; then
            echo "::warning::Primary failed - Trying secondary"
            if ! handle_vpn_attempt "$SECONDARY_CONFIG" "secondary"; then
              echo "::error::All VPN configurations failed after 3 attempts each"
              exit 11
            fi
          fi
          if ! sudo wg show wg0 >/dev/null 2>&1; then
            echo "::error::VPN connection verification failed"
            exit 12
          fi
        
      - name: Download files
        run: |
          mkdir -p magnet_output
          download_output=$(webtorrent download "${{ inputs.source }}" --out magnet_output)
          files_name=$(echo "$download_output" | grep -oP '(?<=Downloading: ).*' | head -n 1)
          # sanitized_file_name=$(echo "$files_name" | tr -cd '[:alnum:]_.-[:space:]' | sed 's/^[_.-]*//;s/[_.-]*$//')
          echo "files_name=${files_name}" >> $GITHUB_ENV

      - name: VPN Cleanup
        if: ${{ always() }}
        run: sudo wg-quick down wg0 || true
        
      - name: Zip files 
        run: |
          mkdir -p buzz gofile
          zip -0 -r -s 2g "gofile/${{ env.files_name }}.zip" magnet_output
          zip -0 -r -m "buzz/${{ env.files_name }}.zip" magnet_output
        shell: bash

      - name: Upload files to BuzzHeavier
        run: |
          for file in buzz/*; do
            if [ -f "$file" ]; then
              file_name_no_ext="${file%.*}"
              file_name="${file_name_no_ext##*/}"  
              extension="${file##*.}" 
        
              # Encode the filename and extension separately
              encoded_file_name=$(echo "$file_name" | jq -sRr @uri)
              encoded_extension=$(echo "$extension" | jq -sRr @uri)

              if [ ${#encoded_file_name} -gt 490 ]; then
                encoded_file_name="${encoded_file_name:0:490}"
                # Remove any partial encoding at the end
                encoded_file_name="${encoded_file_name%\%[0-9A-Fa-f][0-9A-Fa-f]}"
                encoded_file_name="${encoded_file_name%\%[0-9A-Fa-f]}"
              fi
              full_file_name="${encoded_file_name}.${encoded_extension}"

              response_file=$(mktemp)
              http_status_code=$(curl --globoff --silent --show-error -X PUT \
              "https://w.buzzheavier.com/${full_file_name}" -T "$file" -o "$response_file" -w "%{http_code}") || true

              response_body=$(cat "$response_file" 2>/dev/null || true)
              response_code=$(echo "$response_body" | jq -r '.code' 2>/dev/null || true)
              rm -f "$response_file"
              
              if [[ "$response_code" == 201 ]]; then
                download_id=$(echo "$response_body" | jq -r '.data.id')
                download_url="https://buzzheavier.com/${download_id}"
                echo "buzz_url=$download_url" >> $GITHUB_ENV
              else
                echo "Upload failed with response code $response_code: $response_body"
              fi
            fi
          done

      - name: Upload Files to Gofile
        run: |
          UPLOAD_URL="https://upload.gofile.io/uploadfile"
          guest_token=""
          folder_id=""
          UPLOAD_LINKS=""
          FIRST_FILE=true

          while IFS= read -r -d '' file; do
            echo "Starting upload: $(basename "$file")"
            extra_args=()
            if [ "$FIRST_FILE" = false ]; then
              extra_args+=(-H "Authorization: Bearer $guest_token" -F "folderId=$folder_id")
            fi
            
            resp_and_code=$(curl --silent --show-error --fail -X POST "${extra_args[@]}" -F "file=@${file}" "$UPLOAD_URL" -w "%{http_code}" -o -) || true
            http_code="${resp_and_code: -3}"
            response_body="${resp_and_code:0:${#resp_and_code}-3}"

            if ! echo "$response_body" | jq . >/dev/null 2>&1; then
              echo "::error file=$file::Upload failed: invalid JSON response (HTTP $http_code)"
              continue
            fi

            if [ "$FIRST_FILE" = true ]; then
              guest_token=$(echo "$response_body" | jq -r '.data.guestToken // empty')
              folder_id=$(echo "$response_body" | jq -r '.data.parentFolder // empty')
              if [ -n "$guest_token" ] && [ -n "$folder_id" ]; then
                FIRST_FILE=false
                echo "GUEST_TOKEN=$guest_token" >> $GITHUB_ENV
                echo "FOLDER_ID=$folder_id" >> $GITHUB_ENV
                echo "::add-mask::$guest_token"
                echo "Created folder ID: $folder_id"
              fi
            fi

            status=$(echo "$response_body" | jq -r '.status // empty')
            if [ "$status" != "ok" ]; then
              err=$(echo "$response_body" | jq -r '.data // .message // "unknown error"')
              echo "::error file=$file::Upload failed (HTTP $http_code): $err"
              continue
            fi

            link=$(echo "$response_body" | jq -r '.data.downloadPage // empty')
            if [ -z "$link" ]; then
              echo "::error file=$file::Upload succeeded but no download link in response"
              continue
            fi

            UPLOAD_LINKS+="- $(basename "$file")\n"
            echo "Success: $link"
            LAST_LINK="$link"
          done < <(find gofile/ -type f -print0)

          echo -e "### File Uploads:\n${{ env.buzz_url }}\n${LAST_LINK}\n${UPLOAD_LINKS}" >> $GITHUB_STEP_SUMMARY

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"File Uploads: \n${{ env.buzz_url }} \n$LINK \n$UPLOAD_LINKS\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
            
