name: Magnet Downloader
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Input link"
        required: true
        type: string
      upload_to_gphoto:
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'

jobs:
  process-downloader:
    runs-on: ubuntu-latest
    steps:

      - name: Set monthly cache key
        run: |
          MONTH=$(date +"%Y.%m")
          echo "month=${MONTH}" >> $GITHUB_ENV

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: wireguard-tools
          version: ${{ env.month }}

      - name: Maximize runner disk
        uses: justinthelaw/maximize-github-runner-space@v0.8.0
        with:
           cleanup-profile: max
           skip-components: cached-tools
           swapfile-size: 10G

      - name: Install Dependency 
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          sudo npm install webtorrent-cli -g
          python3 -m pip install -U gigafile 'https://github.com/xob0t/google_photos_mobile_client/archive/refs/heads/main.zip'

      - name: VPN Setup 
        env: 
          PRIMARY_CONFIG: ${{ secrets.WIREGUARD_GRANDCENTRAL }}
          SECONDARY_CONFIG: ${{ secrets.WIREGUARD_TRADEWAR }}
          
        run: |
          sudo mkdir -p /etc/wireguard/
          WG_CONF="/etc/wireguard/wg0.conf"
          handle_vpn_attempt() {
            local config_content="$1"
            local label="$2"
            
            echo "$config_content" | sudo tee $WG_CONF > /dev/null
            sudo chmod 600 $WG_CONF

            for i in {1..3}; do
              if timeout 60 sudo wg-quick up wg0; then
                return 0
              fi
              echo "${label^} VPN attempt $i/3 failed"
              sleep 3
            done
            return 1
          }
          if ! handle_vpn_attempt "$PRIMARY_CONFIG" "primary"; then
            echo "::warning::Primary failed - Trying secondary"
            if ! handle_vpn_attempt "$SECONDARY_CONFIG" "secondary"; then
              echo "::error::All VPN configurations failed after 3 attempts each"
              exit 11
            fi
          fi
          if ! sudo wg show wg0 >/dev/null 2>&1; then
            echo "::error::VPN connection verification failed"
            exit 12
          fi
        
      - name: Download files
        run: |
          mkdir -p magnet_output
          download_output=$(webtorrent download "${{ inputs.source }}" --out magnet_output)
          files_name=$(echo "$download_output" | grep -oP '(?<=Downloading: ).*' | head -n 1)
          # sanitized_file_name=$(echo "$files_name" | tr -cd '[:alnum:]_.-[:space:]' | sed 's/^[_.-]*//;s/[_.-]*$//')
          echo "files_name=${files_name}" >> $GITHUB_ENV
        
      - name: Prepare files for FTP upload
        run: |
          mkdir -p ftp_upload
          find magnet_output -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.ts" -o -name "*.webm" \) \
            -exec mv -- {} ftp_upload/ \;
          
          if [ "$(ls -A ftp_upload)" ]; then
            echo "has_files=true" >> $GITHUB_ENV
            echo "Files found in ftp_upload directory"
          else
            echo "has_files=false" >> $GITHUB_ENV
            echo "No files found. Skipping FTP upload."
          fi

      - name: Upload Files to G Storage
        if: ${{ github.event.inputs.upload_to_gphoto == 'true' }}
        continue-on-error: true
        env: 
          GP_AUTH_DATA: ${{ secrets.GPMC_AUTH_DATA }}
        run: gpmc "ftp_upload/"

      - name: VPN Cleanup
        if: ${{ always() }}
        run: sudo wg-quick down wg0 || true

      - name: Upload to FTP (Server 1)
        if: env.has_files == 'true'
        continue-on-error: true
        run: |
          UPLOAD_SERVER=$(curl -s "https://vidsonic.net/api/v1/getUploadSrv?key=${{ secrets.vidsonic_api_key }}" | jq -r '.server')
          for f in ftp_upload/*; do
            [ -f "$f" ] && curl -X POST $UPLOAD_SERVER \
              -F "apiKey=${{ secrets.vidsonic_api_key }}" -F "video=@$f" \
              && echo "Uploaded: $(basename "$f")"
          done

      - name: Upload to FTP (Server 2)
        if: env.has_files == 'disable'
        run: |
          lftp -u ${{ secrets.FTP_LOGIN_ARCHIVE }} -e "
            set ssl:verify-certificate false;
            set cache:size 524288000;
            mput -P 1 ftp_upload/*;
            bye"
          echo "ftp upload 2 done"
          # 'user,pass' ftp://host/

      - name: Upload to FTP (Server 3)
        if: env.has_files == 'true'
        continue-on-error: true
        run: |
          upload_server=$(curl -s "https://api.vidara.so/v1/upload/server?api_key=${{ secrets.STREAMIX_API_KEY }}" | jq -r '.result.upload_server')
          for f in ftp_upload/*; do
            [ -f "$f" ] && curl -X POST "$upload_server" \
              -F "api_key=${{ secrets.STREAMIX_API_KEY }}" -F "file=@$f" \
              && echo "Uploaded: $(basename "$f")"
          done
          
      - name: Zip files 
        run: |
          cd magnet_output
          if [ -n "$(find . -type f)" ]; then
            zip -0 -r -m -s 2g "${{ env.files_name }}.zip" .
          else
            echo "Skipping zip: No non-video files found"
          fi

      - name: Upload Files to Gofile
        run: |
          if [ -z "$(find magnet_output -type f -print -quit)" ]; then
            echo "Skipping GoFile upload: No files to upload"
            exit 0
          fi
                    
          UPLOAD_URL="https://upload.gofile.io/uploadfile"
          guest_token=""
          folder_id=""
          UPLOAD_LINKS=""
          FIRST_FILE=true

          while IFS= read -r -d '' file; do
            echo "▫️ Starting Gofile upload: $(basename "$file")"
            extra_args=()
            if [ "$FIRST_FILE" = false ]; then
              extra_args+=(-H "Authorization: Bearer $guest_token" -F "folderId=$folder_id")
            fi
            
            RESPONSE=$(curl -s -X POST -F "file=@\"$file\"" "${extra_args[@]}" "$UPLOAD_URL")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
            DOWNLOAD_PAGE=$(echo "$RESPONSE" | jq -r '.data.downloadPage // .data // empty')

            if [ "$FIRST_FILE" = true ]; then
              guest_token=$(echo "$RESPONSE" | jq -r '.data.guestToken // empty')
              folder_id=$(echo "$RESPONSE" | jq -r '.data.parentFolder // empty')
              FIRST_FILE=false
              echo "Created Gofile folder"
            fi

            if [ "$STATUS" != "ok" ]; then
              echo "::warning::Gofile upload failed for $(basename "$file"): $DOWNLOAD_PAGE"
            else
              echo "✓ Gofile success: $LINK"
            fi
            LINK="$DOWNLOAD_PAGE"
            UPLOAD_LINKS+="- $(basename "$file") \n"
          done < <(find magnet_output/ -type f -print0)
          
          mkdir -p giga
          set -euo pipefail
          name=$(basename "$(find magnet_output -type f ! -name '*.txt' -print -quit)" | sed 's/\.[^.]*$//')
          zip -r "giga/${name}.zip" magnet_output
          gout=$(gfile --hide-progress upload "giga/${name}.zip")
          gigaURL=$(printf '%s\n' "$gout" | grep -oE 'https?://([^.[:space:]]+\.)?gigafile\.nu/[^[:space:]]+' | tail -n1)

          echo "### File Uploads: $LINK I $gigaURL" >> $GITHUB_STEP_SUMMARY
          echo -e "\n$UPLOAD_LINKS" >> $GITHUB_STEP_SUMMARY

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"File Uploads: $LINK I $gigaURL \n$UPLOAD_LINKS\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
