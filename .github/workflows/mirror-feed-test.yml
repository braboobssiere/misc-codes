name: Mirror nitter Feed

on:
  workflow_dispatch:  # Allows manual triggering

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      FEED_FILE_PATH: feeds/nitter.rss
      FEED_SELF_LINK: https://raw.githubusercontent.com/braboobssiere/misc-codes/main/feeds/nitter.rss
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create feeds directory
        run: |
          mkdir -p feeds

      - name: Fetch feed
        run: |
          curl -sf "https://xcancel.com/firefox/rss" -o feeds/nitter.rss

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add feeds/nitter.rss
          git commit -m "Update feed" || echo "No changes to commit"
          git push
