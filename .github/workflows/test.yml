name: Build Android APK from FFmpegKit Extended Repo

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout ffmpeg-kit-extended
        uses: actions/checkout@v6
        with:
          repository: akashskypatel/ffmpeg-kit-extended

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 🔍 Debug: Show directory structure to locate the Flutter app
      - name: 📂 List repository contents
        run: ls -la

      # The Flutter app is inside the "flutter" folder
      - name: 📂 Change to Flutter app directory
        run: cd flutter
        # Note: This cd only affects this step; we must set working-directory for later steps.

      # ✅ Now set working-directory for all Flutter commands
      - name: 📦 Install dependencies
        working-directory: flutter
        run: flutter pub get

      - name: 🎬 Configure FFmpegKit (Full)
        working-directory: flutter
        run: dart run ffmpeg_kit_extended_flutter:configure --platform=android --verbose
        env:
          FFMPEG_KIT_FULL: "true"

      - name: 💾 Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build release APK
        working-directory: flutter
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffmpegkit-example-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
