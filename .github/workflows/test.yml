name: Build Android APK (Full FFmpegKit)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # Latest checkout action
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      # Latest setup-java action
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Latest flutter-action (still v2 major tag)
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # The latest stable Flutter version as of May 2026 is 3.41.8[reference:9].
          # It's recommended to pin to a specific version for reproducible builds.
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🎬 Configure FFmpegKit (Full)
        run: dart run ffmpeg_kit_extended_flutter:configure --platform=android --verbose
        env:
          FFMPEG_KIT_FULL: "true"

      # Updated cache action
      - name: 💾 Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build release APK
        run: flutter build apk --release --split-per-abi

      # Updated upload-artifact action
      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-full
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
