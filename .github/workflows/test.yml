name: Build Example APK (Full FFmpegKit)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout ffmpeg-kit-extended
        uses: actions/checkout@v6
        with:
          repository: akashskypatel/ffmpeg-kit-extended

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # Insert config using echo lines instead of heredoc
      - name: ✏️ Inject FFmpegKit config (full)
        working-directory: flutter/example
        run: |
          if ! grep -q "ffmpeg_kit_extended_config:" pubspec.yaml; then
            echo "" >> pubspec.yaml
            echo "  ffmpeg_kit_extended_config:" >> pubspec.yaml
            echo "    type: \"full\"" >> pubspec.yaml
            echo "    gpl: true" >> pubspec.yaml
            echo "    small: false" >> pubspec.yaml
          else
            echo "Config already present."
          fi
          cat pubspec.yaml   # Debug

      - name: 🧹 Clean previous builds
        working-directory: flutter/example
        run: flutter clean

      - name: 📦 Install dependencies
        working-directory: flutter/example
        run: flutter pub get

      - name: 💾 Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flutter/example/android/*.gradle*', 'flutter/example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build release APK (split per ABI)
        working-directory: flutter/example
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffmpegkit-full-apk
          path: flutter/example/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
