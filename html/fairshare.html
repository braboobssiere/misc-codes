<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FairShare – Split bills fairly</title>
    <link rel="stylesheet" href="../css/fairshare-style.css">
    <link rel="manifest" href="../js/fairshare-manifest.json">
    <link rel="apple-touch-icon" href="../image/fairshare-icons/icon-192.png">
    <meta name="theme-color" content="#6750A4">
</head>
<body>
<div class="app-container">
    <!-- 1/10: Header -->
    <header class="header">
        <div class="logo">🍽️ FairShare</div>
        <div class="header-actions">
            <button class="icon-btn" id="historyBtn">📅</button>
            <button class="icon-btn" id="exportBtn">📤</button>
            <button class="icon-btn" id="importBtn">📥</button>
        </div>
    </header>

    <!-- 2/10: Top controls (tabs + controls row) -->
    <div class="top-controls">
        <div class="invoice-tabs-container">
            <div class="invoice-tabs" id="invoiceTabs"></div>
        </div>
        <div class="controls-row">
            <div class="controls-left">
                <div class="currency-selector">
                    <select id="globalCurrencySelect"></select>
                    <button id="addCurrencyBtn" class="icon-btn tiny">➕</button>
                </div>
                <div class="people-selector">
                    <label for="peopleCount">👥</label>
                    <input type="number" id="peopleCount" min="1" value="2">
                    <button class="icon-btn tiny" id="editNamesBtn">✏️</button>
                </div>
                <button class="icon-btn tiny" id="editInvoiceNameBtn">✏️ Inv</button>
                <button class="icon-btn tiny" id="newBillBtn">➕ Bill</button>
            </div>
            <button class="icon-btn tiny danger" id="resetInvoiceBtn">⟳ Reset</button>
        </div>
    </div>

    <!-- 3/10: Main tabs (Invoice/Summary) -->
    <div class="main-tabs" role="tablist">
        <button class="tab-btn active" data-tab="invoice">Invoice</button>
        <button class="tab-btn" data-tab="summary">Summary</button>
    </div>

    <!-- Invoice Tab Panel (visible by default) -->
    <div id="invoiceTab" class="content-area">
        <div id="itemsContainer" class="items-list">
            <div class="empty-message">✨ Add your first item</div>
        </div>
        <div class="bill-total" id="invoiceTotalDisplay">TOTAL: 0.00 USD</div>
        <div class="settings-row-compact">
            <label class="setting-compact"><input type="checkbox" id="enableSC"> SC <input type="number" id="scPercent" value="10" step="0.5" min="0" max="100">%</label>
            <label class="setting-compact"><input type="checkbox" id="enableVAT"> VAT <input type="number" id="vatPercent" value="7" step="0.5" min="0" max="100">%</label>
            <div class="setting-compact">
                <select id="discountType"><option value="amount">$</option><option value="percent">%</option></select>
                <input type="number" id="discountValue" value="0" step="any" min="0">
            </div>
            <div class="discount-timing-buttons">
                <button class="timing-btn" data-timing="beforeSC">Before SC</button>
                <button class="timing-btn" data-timing="beforeVAT">Before VAT</button>
                <button class="timing-btn active" data-timing="afterAll">After All</button>
            </div>
        </div>
    </div>

    <!-- Summary Tab Panel (hidden initially) -->
    <div id="summaryTab" style="display: none;" class="summary-area">
        <div class="receipt-box" id="receiptView">Loading...</div>
        <div class="shares-box" id="sharesView"></div>
        <div class="summary-actions">
            <button class="icon-btn" id="printSummaryBtn">🖨️ Print</button>
            <button class="icon-btn" id="exportCsvBtn">📎 CSV</button>
        </div>
    </div>
</div>

<!-- History Modal -->
<div id="historyModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📆 Invoice History</h3>
            <button id="closeHistoryBtn" class="icon-btn">✖ Close</button>
        </div>
        <div class="calendar-header">
            <button id="prevMonthBtn">◀</button>
            <span id="monthYearDisplay"></span>
            <button id="nextMonthBtn">▶</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div id="selectedDayInvoices" class="selected-invoices"></div>
        <button id="deleteSelectedInvoiceBtn" class="icon-btn danger">Delete Selected Invoice</button>
    </div>
</div>

<script src="../js/fairshare-script.js"></script>
</body>
</html>
